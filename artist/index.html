<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Hub | Tone Strike Labs</title>
    <style>
        :root {
            --primary-color: #6A1B9A; /* Deep Purple */
            --secondary-color: #B71C1C; /* Blood Red */
            --bg-dark: #0a0a0a;
            --text-light: #f4f4f4;
        }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: sans-serif; margin: 0; padding: 0; }
        .hero { text-align: center; padding: 60px 20px; border-bottom: 5px solid var(--primary-color); background: #121212; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .content-block { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--secondary-color); }
        .btn { display: block; background: var(--secondary-color); color: white; text-align: center; padding: 15px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        h3 { color: var(--primary-color); margin-top: 0; }
        .copy-box { background: #000; padding: 15px; color: #00ff00; border: 1px solid #333; font-family: monospace; white-space: pre-wrap; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>ARTIST MEDIA HUB</h1>
        <p>Tone Strike Labs "Sale-Ready" Template</p>
    </div>

    <div class="container">
        
        <div class="content-block">
            <h3>Style Tags (Box 1)</h3>
            <div class="copy-box">[Paste your Style Tags here]</div>
        </div>

        <div class="content-block">
            <h3>Song Structure (Box 2)</h3>
            <div class="copy-box">[Paste your Lyrics and Structure here]</div>
        </div>

        <div class="content-block" style="border-left-color: var(--primary-color);">
            <h3>Version 5 Workbook</h3>
            <p>High-quality results for Christian Guitarists.</p>
            <a href="#" class="btn">VIEW ON GUMROAD</a>
        </div>

    </div>

    <footer style="text-align:center; padding: 40px; opacity: 0.5; font-size: 0.8rem;">
        Built by Tone Strike Labs
    </footer>

</body>
</html>
